name: publish-image

# Build the Linux/amd64 benchmark image once and push it to GHCR, so EC2 (and anyone else) can
# `docker pull` it in seconds instead of compiling two OCaml compilers from source (~40 min).
# First build is slow; buildx gha cache makes subsequent builds fast.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - docker/Dockerfile
      - rust/**
      - ocaml/**
      - bench/gen_workload/**
      - spec/**
      - scripts/**

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          # GHCR names must be lowercase; the repo owner is "Dmdv".
          tags: ghcr.io/dmdv/ocaml-vs-rust-hft:linux-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: echo "Pushed ghcr.io/dmdv/ocaml-vs-rust-hft:linux-amd64 — make the package Public in repo → Packages so EC2 can pull it without auth."
